name: Build Bilup Packager Extras

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.9'

    - name: Create virtual environment
      run: python -m venv venv

    - name: Activate virtual environment
      run: .\venv\Scripts\Activate.ps1

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build executable
      run: pyinstaller --noconsole --noconfirm --clean --add-data "third-party;third-party" --add-data "icon.png;." --name "bilup-packager-extras" --version-file file_version_info.txt --icon icon.ico app.py

    - name: Create zip
      run: python generate-zip.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bilup-packager-extras
        path: |
          dist/
          bilup-packager-extras.zip
